name: Android CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-progress runs for the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Unit tests & debug build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # The debug build type signs with ${rootDir}/debug.keystore, which is
      # git-ignored. Restore it from the committed base64 copy so the build
      # can run in CI.
      - name: Restore debug keystore
        run: base64 --decode debug.keystore.base64 > debug.keystore

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Assemble debug APK
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: app/build/reports/tests/
          if-no-files-found: ignore

  # Keep the website's "Download APK" button working: every push to main
  # refreshes a rolling "latest" GitHub release with the freshly built APK
  # (the site links to /releases/latest).
  publish-latest:
    name: Publish rolling "latest" release
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download debug APK
        uses: actions/download-artifact@v4
        with:
          name: app-debug

      - name: Create or refresh the "latest" release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view latest -R "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create latest -R "$GITHUB_REPOSITORY" \
              --title "Latest field build" \
              --notes "Rolling release — newest debug APK from main."
          gh release upload latest *.apk -R "$GITHUB_REPOSITORY" --clobber
          gh release edit latest -R "$GITHUB_REPOSITORY" \
            --notes "Rolling release — newest debug APK from main. Built from ${GITHUB_SHA::7} (run #${{ github.run_number }})."
