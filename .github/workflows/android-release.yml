name: Android Release Build

# Manually triggered build that produces an installable release APK.
# If signing secrets are configured (see below) the APK is release-signed and
# upload-ready; otherwise it falls back to a debug-signed APK that still
# installs on a real device for testing.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-apk:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      # Optional release signing. Configure these repository secrets to get a
      # release-signed APK:
      #   RELEASE_KEYSTORE_BASE64  - base64 of your .jks keystore
      #   RELEASE_STORE_PASSWORD, RELEASE_KEY_PASSWORD, RELEASE_KEY_ALIAS
      - name: Decode release keystore (if configured)
        id: keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"
            echo "path=$RUNNER_TEMP/release.jks" >> "$GITHUB_OUTPUT"
            echo "Release keystore configured."
          else
            echo "No RELEASE_KEYSTORE_BASE64 secret set; falling back to debug signing."
          fi

      # The release build falls back to the debug key when no release signing is
      # present, so we always need the debug keystore available too.
      - name: Restore debug keystore
        run: base64 --decode debug.keystore.base64 > debug.keystore

      - name: Assemble release APK
        env:
          KEYSTORE_PATH: ${{ steps.keystore.outputs.path }}
          STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
