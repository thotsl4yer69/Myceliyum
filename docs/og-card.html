    background-size: 40px 40px; background-position: center;
  }
  .vign { position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 45%, transparent 40%, rgba(11,13,11,0.85) 100%); }

  .tag b { color: #D7D9CB; font-weight: 500; }
  .chips { display: flex; gap: 14px; margin-top: 34px; }
  .chip { font-family: 'IBM Plex Mono', monospace; font-size: 15px; letter-spacing: 0.16em; color: #8E9583; border: 1px solid #363C2A; padding: 10px 18px; background: rgba(20,22,15,0.7); }
  .cut { position: absolute; width: 22px; height: 22px; }
  .cut::before, .cut::after { content: ""; position: absolute; background: #4a5240; }
  .cut::before { width: 22px; height: 2px; } .cut::after { width: 2px; height: 22px; }
