<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"></meta>
<title>OG Card — Myceliyums</title>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@600;700&amp;family=Saira:wght@400;500&amp;family=IBM+Plex+Mono:wght@400;500;600&amp;display=swap" rel="stylesheet"></link>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    background: #0B0D0B; color: #D7D9CB; font-family: 'Saira', sans-serif; position: relative;
    background-image: linear-gradient(#2B3022 1px, transparent 1px), linear-gradient(90deg, #2B3022 1px, transparent 1px);
    background-size: 40px 40px; background-position: center;
  }
  .vign { position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 45%, transparent 40%, rgba(11,13,11,0.85) 100%); }
  .card { position: absolute; inset: 0; display: flex; align-items: center; gap: 70px; padding: 0 90px; }
  .mark { width: 360px; height: 360px; flex: none; filter: drop-shadow(0 0 34px rgba(84,224,160,0.22)); }
  .fig { font-family: 'IBM Plex Mono', monospace; font-size: 19px; letter-spacing: 0.32em; color: #E6B24C; margin-bottom: 22px; }
  h1 { font-family: 'Saira Condensed', sans-serif; font-weight: 700; font-size: 130px; line-height: 0.92; letter-spacing: 0.02em; text-transform: uppercase; }
  h1 b { color: #54E0A0; }
  .tag { font-size: 34px; font-weight: 400; color: #8E9583; margin-top: 26px; line-height: 1.3; }
  .tag b { color: #D7D9CB; font-weight: 500; }
  .chips { display: flex; gap: 14px; margin-top: 34px; }
  .chip { font-family: 'IBM Plex Mono', monospace; font-size: 15px; letter-spacing: 0.16em; color: #8E9583; border: 1px solid #363C2A; padding: 10px 18px; background: rgba(20,22,15,0.7); }
  .cut { position: absolute; width: 22px; height: 22px; }
  .cut::before, .cut::after { content: ""; position: absolute; background: #4a5240; }
  .cut::before { width: 22px; height: 2px; } .cut::after { width: 2px; height: 22px; }
  .cut.tl { top: 26px; left: 26px; } .cut.tl::before, .cut.tl::after { top: 0; left: 0; }
  .cut.tr { top: 26px; right: 26px; } .cut.tr::before { top: 0; right: 0; } .cut.tr::after { top: 0; right: 0; }
  .cut.bl { bottom: 26px; left: 26px; } .cut.bl::before { bottom: 0; left: 0; } .cut.bl::after { bottom: 0; left: 0; }
  .cut.br { bottom: 26px; right: 26px; } .cut.br::before { bottom: 0; right: 0; } .cut.br::after { bottom: 0; right: 0; }
</style>
</head>
<body>
  <div class="vign"></div>
  <div class="cut tl"></div><div class="cut tr"></div><div class="cut bl"></div><div class="cut br"></div>
  <div class="card">
    <svg class="mark" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">

      <path d="M24 5.75C13 5.75 6.15 12.6 6.15 20.7c0 3 2.35 4.6 5.7 5.05 2.7.35 4.65 1.8 4.95 4.55l.8 6.4c.3 2.45 2.9 4.05 6.4 4.05s6.1-1.6 6.4-4.05l.8-6.4c.3-2.75 2.25-4.2 4.95-4.55 3.35-.45 5.7-2.05 5.7-5.05C41.85 12.6 35 5.75 24 5.75Z" stroke="#1f9e6c" stroke-width="1.1" opacity="0.5"></path>
      <path d="M24 7.5C14 7.5 7.8 13.7 7.8 20.9c0 2.6 2.1 4 5.2 4.5 2.9.4 5 2 5.3 4.9l.7 5.6c.3 2.2 2.4 3.6 5 3.6s4.7-1.4 5-3.6l.7-5.6c.3-2.9 2.4-4.5 5.3-4.9 3.1-.5 5.2-1.9 5.2-4.5C40.2 13.7 34 7.5 24 7.5Z" stroke="#54E0A0" stroke-width="1.9"></path>
      <path d="M24 11c-7.8 0-12.8 4.8-12.8 10.3 0 1.9 1.6 3 4.2 3.5 3.3.6 5.6 2.4 5.9 5.5l.5 3.9c.2 1.7 1 2.7 2.2 2.7s2-1 2.2-2.7l.5-3.9c.3-3.1 2.6-4.9 5.9-5.5 2.6-.5 4.2-1.6 4.2-3.5C36.8 15.8 31.8 11 24 11Z" stroke="#1f9e6c" stroke-width="1.2" opacity="0.6"></path>
      <path d="M24 13.7V11.8M27.9 14.75 28.85 13.1M20.1 14.75 19.15 13.1M30.75 17.6 32.4 16.65M17.25 17.6 15.6 16.65" stroke="#1f9e6c" stroke-width="1" opacity="0.55" stroke-linecap="round"></path>
      <path d="M24 14.5c-5.4 0-8.9 3.3-8.9 7 0 1.3 1.1 2 2.9 2.4 2.7.55 4.6 2 5 4.6.1.8.5 1.2 1 1.2s.9-.4 1-1.2c.4-2.6 2.3-4.05 5-4.6 1.8-.4 2.9-1.1 2.9-2.4 0-3.7-3.5-7-8.9-7Z" fill="#54E0A0"></path>
      <circle cx="24" cy="22" r="2.4" fill="#0B0D0B"></circle>
      <path d="M24 18.1v1.1M24 24.8v1.1M20.2 22h1.1M26.7 22h1.1" stroke="#E6B24C" stroke-width="1" opacity="0.9"></path>
      <circle cx="24" cy="22" r="1.4" fill="#E6B24C"></circle>
    </svg>
    <div>
      <div class="fig">FIELD SIGNAL TERMINAL</div>
      <h1>Myceli<b>yums</b></h1>
      <div class="tag">Read the forest <b>before it fruits.</b></div>
      <div class="chips">
        <span class="chip">10 WEIGHTED SIGNALS</span>
        <span class="chip">EARTH ENGINE SATELLITE</span>
        <span class="chip">WORLDWIDE</span>
      </div>
    </div>
  </div>
</body>
</html>
