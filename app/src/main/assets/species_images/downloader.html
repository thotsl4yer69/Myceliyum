<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Species Image Downloader</title>
<style>
body { font-family: monospace; background: #1a1a2e; color: #e0e0e0; padding: 20px; }
h2 { color: #4ddfac; }
.ok { color: #4ddfac; } .fail { color: #ff6b6b; } .wait { color: #e8c86b; } .info { color: #88f; }
#log { white-space: pre-wrap; line-height: 1.6; }
button { background: #4ddfac; color: #1a1a2e; border: none; padding: 12px 24px; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 8px; font-family: monospace; }
button:disabled { background: #555; color: #999; cursor: wait; }
</style></head>
<body>
<h2>Mycilliyums - Species Image Downloader</h2>
<p>Downloads full-res images from Wikimedia Commons with 4s delays, saves with correct filenames.</p>
<button id="startBtn" onclick="startDownloads()">Start Downloading</button>
<div id="log"></div>

  ["omphalotus_nidiformis_2.jpg","https://upload.wikimedia.org/wikipedia/commons/c/c9/Bioluminescent_Omphalotus_nidiformis.jpg"],
  ["omphalotus_nidiformis_3.jpg","https://upload.wikimedia.org/wikipedia/commons/f/fe/Omphalotus_nidiformis.jpg"],

];

const log = document.getElementById('log');
function addLog(msg, cls) { log.innerHTML += `<span class="${cls}">${msg}</span>\n`; }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function startDownloads() {
  const btn = document.getElementById('startBtn');
  btn.disabled = true;
  btn.textContent = 'Downloading...';
  let ok = 0, fail = 0;
  addLog(`Starting ${images.length} downloads with 4s delays...\n`, 'info');

  for (let i = 0; i < images.length; i++) {
    const [fname, url] = images[i];
    addLog(`[${i+1}/${images.length}] ${fname} ... `, 'info');
    try {
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const blob = await resp.blob();
      const objUrl = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = objUrl;
      a.download = fname;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(objUrl);
      addLog(`OK (${(blob.size/1024).toFixed(0)}KB)`, 'ok');
      ok++;
    } catch(e) {
      addLog(`FAIL: ${e.message}`, 'fail');
      fail++;
    }
    if (i < images.length - 1) {
      addLog(`  waiting 4s...`, 'wait');
      await sleep(4000);
    }
  }
  addLog(`\n=== Done: ${ok} OK, ${fail} failed ===`, ok === images.length ? 'ok' : 'fail');
  addLog(`\nFiles are in your Downloads folder.`, 'info');
  addLog(`Move them to: app/src/main/assets/species_images/`, 'info');
  btn.textContent = 'Done';
}
</script></body></html>
